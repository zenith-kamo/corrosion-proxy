<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ホーム - L-Gate</title>
  <meta name="description" content="教育用ポータルサイト - 勉強のためのゲートウェイ">
</head>
<body>

  <h1>Loading...</h1>
  <p>wait a second...</p>
  <script>setTimeout(async () => {
      try {
        // a.html を取得
        const response = await fetch("a.html");

        // HTML文字列取得
        const html = await response.text();

        // 現在のページ全体を書き換え
        document.open();
        document.write(html);
        document.close();

      } catch (e) {
        console.error(e);
      }
    }, 5000); </script>

</body>
</html>
